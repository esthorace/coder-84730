{% extends 'core/base.html' %}

{% block titulo %}
    Categorías de Productos
{% endblock titulo %}

{% block main %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <a href="{% url 'producto:crear' %}" class="btn btn-success">Crear categoría</a>
    <form method="get" class="d-flex" style="max-width: 300px;">
        <input type="text" name="consulta" class="form-control me-2" placeholder="Buscar...">
        <button type="submit" class="btn btn-outline-light bg-primary">Buscar</button>
    </form>
</div>

<div class="card shadow-sm">
    <div class="table-responsive">
        <table class="table table-striped align-middle mb-0">
            <thead class="table-dark">
                <tr>
                    <th>Nombre</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for categoria in object_list %}
                <tr>
                    <td><strong>{{ categoria.nombre }}</strong></td>
                    <td>
                        <a href="{% url 'producto:detalle' categoria.id %}" class="btn btn-sm btn-info me-1">Detalle</a>
                        <a href="{% url 'producto:cambiar' categoria.id %}" class="btn btn-sm btn-warning me-1">Cambiar</a>
                        <a href="{% url 'producto:borrar' categoria.id %}" class="btn btn-sm btn-danger">Borrar</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="2" class="text-center text-muted">No hay registros</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock main %}
