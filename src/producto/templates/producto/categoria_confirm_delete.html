{% extends 'core/base.html' %}

{% block titulo %}
    Borrar Categoría de Productos
{% endblock titulo %}

{% block main %}
<div class="card shadow mx-auto" style="max-width: 500px;">
    <div class="card-body">
        <p class="mb-4">¿Estás seguro de borrar la categoría <strong>{{ categoria.nombre }}</strong>?</p>
        <form method="post" class="d-flex justify-content-between">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Confirmar</button>
            <a href="{% url 'producto:categoria_list' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock main %}
