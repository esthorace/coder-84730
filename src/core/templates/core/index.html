{% extends 'core/base.html' %}

{% load static %}

{% block titulo %}
  <span class="fs-2 fw-bold">La Caja de Pandora</span>
{% endblock titulo %}

{% block main %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 40vh;">
  <div class="card shadow" style="width: 22rem;">
    <img src="{% static 'core/img/caja-pandora.jpg' %}" class="card-img-top" alt="imagen">
    <div class="card-body text-center">
      <h5 class="card-title">Bienvenido a la Caja de Pandora</h5>
      <p class="card-text">Explora productos y categorías usando el menú superior.</p>
    </div>
  </div>
</div>
{% endblock main %}
